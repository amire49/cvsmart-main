services:
  - type: web
    name: cvsmart-backend
    rootDir: backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --timeout 120
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: ADZUNA_APP_ID
        sync: false
      - key: ADZUNA_APP_KEY
        sync: false
      - key: RAPIDAPI_KEY
        sync: false
      - key: AUTHORIZED_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: RATELIMIT_STORAGE_URL
        sync: false

